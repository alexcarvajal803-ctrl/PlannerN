                                </div>
                            </div>
                        </div>

                        <div>
                            <button 
                                type="button"
                                onClick={() => setShowMicros(!showMicros)}
                                className="flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-800"
                            >
                                {showMicros ? <ChevronUp className="mr-2"/> : <ChevronDown className="mr-2"/>}
                                {showMicros ? 'Ocultar Micronutrientes' : 'Agregar Micronutrientes'}
                            </button>
                            
                            {showMicros && (
                                <div className="mt-3 grid grid-cols-2 gap-3 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                                    {MICRO_FIELDS.map(f => (
                                        <div key={f.key} className="flex flex-col">
                                            <input 
                                                placeholder={`${f.label} (${f.unit})`} 
                                                className="p-2 rounded border border-indigo-200 text-sm focus:outline-none focus:border-indigo-500" 
                                                value={currentFood.micros[f.key] || ''} 
                                                onChange={(e) => setCurrentFood({
                                                    ...currentFood, 
                                                    micros: { ...currentFood.micros, [f.key]: e.target.value }
                                                })} 
                                            />
                                        </div>
                                    ))}
                                    <div className="col-span-2">
                                        <input 
                                            placeholder="Otros / Notas adicionales" 
                                            className="w-full p-2 rounded border border-indigo-200 text-sm focus:outline-none focus:border-indigo-500" 
                                            value={currentFood.micros.other || ''} 
                                            onChange={(e) => setCurrentFood({
                                                ...currentFood, 
                                                micros: { ...currentFood.micros, other: e.target.value }
                                            })} 
                                        />
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col gap-3 pt-4">
                             {currentFood.id ? (
                                 <div className="flex gap-2">
                                     <button type="button" onClick={() => {setCurrentFood(INITIAL_FOOD_STATE); setActiveTab('historyPersonal');}} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-300 transition-colors">Cancelar</button>
                                     <button type="button" onClick={(e) => handleSaveFood(e)} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-semibold shadow-md flex justify-center items-center gap-2 hover:bg-indigo-700 transition-colors"><Save /> Actualizar</button>
                                 </div>
                             ) : (
                                 <button type="button" onClick={(e) => handleSaveFood(e)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg flex justify-center items-center gap-2 hover:bg-indigo-700 transition"><Save /> Guardar en Mi Personal</button>
                             )}
                        </div>
                    </form>
                </div>
            </div>
        );

        // --- COMPONENTE UNIFICADO: HISTORIAL DE ALIMENTOS (TCA / Personal) ---
        const FoodHistoryView = ({ foodList, isTCAView, handleEditClick, handleDeleteClick, handleImportCSV, showConfirm }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedFoodInfo, setSelectedFoodInfo] = useState(null);

            // Filtrar según la pestaña elegida (TCA o Personal)
            const displayedFoods = foodList.filter(f => isTCAView ? f.isTCA : !f.isTCA);

            const normalizeStr = (str) => {
                if(!str) return "";
                return str.toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            };

            const searchWords = normalizeStr(searchTerm).split(' ').filter(w => w.length > 0);

            const searchFiltered = displayedFoods.filter(f => {
                if (searchWords.length === 0) return true;
                const normalizedName = normalizeStr(f.name);
                return searchWords.every(word => normalizedName.includes(word));
            });

            // LÓGICA DE AGRUPACIÓN (Se preserva el orden original explícito)
            const groupedFoods = searchTerm.length === 0 ? searchFiltered.reduce((acc, food) => {
                let groupName = cleanGroupString(food.group);
                const matched = FOOD_GROUPS.find(g => normalizeStr(g) === normalizeStr(groupName));
                groupName = matched || "Otros (Sin clasificar)";

                if (!acc[groupName]) acc[groupName] = [];
                acc[groupName].push(food);
                return acc;
            }, {}) : {};

            const orderedGroups = [...FOOD_GROUPS, "Otros (Sin clasificar)"].filter(g => groupedFoods[g]);

            // Confirmación de borrado personalizada
            const confirmDelete = (foodId, foodName) => {
                showConfirm(
                    "Eliminar Alimento", 
                    `¿Seguro que deseas eliminar "${foodName}" de tu historial personal permanentemente?`,
                    () => handleDeleteClick(foodId)
                );
            };

            return (
                <div className="pb-32 flex flex-col gap-4">
                    <div className={`border p-4 rounded-xl flex items-start gap-3 ${isTCAView ? 'bg-indigo-50 border-indigo-200' : 'bg-emerald-50 border-emerald-200'}`}>
                        {isTCAView ? <BookOpen className="text-indigo-600 text-2xl mt-1" /> : <ClipboardList className="text-emerald-600 text-2xl mt-1" />}
                        <div>
                            <h3 className={`font-bold ${isTCAView ? 'text-indigo-800' : 'text-emerald-800'}`}>
                                {isTCAView ? 'Historial TCA 2018' : 'Historial Personal'}
                            </h3>
                            <p className={`text-xs mt-1 ${isTCAView ? 'text-indigo-600' : 'text-emerald-600'}`}>
                                {isTCAView ? 'Base de datos oficial. Solo modo lectura.' : 'Tus propios alimentos guardados o importados. Puedes editar y eliminar.'}
                            </p>
                        </div>
                    </div>

                    <div className="flex gap-2">
                        <div className="relative flex-1">
                            <input 
                                type="text" 
                                placeholder="Buscar alimento..." 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)} 
                                className="w-full pl-10 pr-4 py-3 bg-white rounded-xl shadow-sm border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none" 
                            />
                            <Search className="absolute left-4 top-4 text-gray-400" />
                        </div>
                        
                        {!isTCAView && (
                            <React.Fragment>
                                <input type="file" accept=".csv" id="csvUpload" style={{ display: 'none' }} onChange={handleImportCSV} />
                                <button onClick={() => document.getElementById('csvUpload').click()} className="bg-emerald-100 text-emerald-700 px-4 rounded-xl font-bold flex flex-col items-center justify-center hover:bg-emerald-200 transition border border-emerald-200" title="Importar CSV">
                                    <UploadIcon className="text-xl mb-1" />
                                    <span className="text-[10px]">Importar</span>
                                </button>
                            </React.Fragment>
                        )}
                    </div>

                    {searchTerm.length > 0 ? (
                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            {searchFiltered.length === 0 ? (
                                <div className="p-8 text-center text-gray-400">
                                    <Utensils className="text-4xl mx-auto mb-3 opacity-30" />
                                    <p>No se encontraron alimentos con "{searchTerm}".</p>
                                </div>
                            ) : (
                                <div className="divide-y divide-gray-50">
                                    {searchFiltered.map(food => (
                                        <div key={food.id} className="p-4 flex justify-between items-center hover:bg-gray-50 transition-colors gap-2">
                                            <div className="flex-1 overflow-hidden pr-2">
                                                <div className="font-bold text-gray-800 text-sm truncate">{food.name}</div>
                                                <div className="text-xs text-gray-500">{food.group} • {food.kcal} kcal</div>
                                            </div>
                                            
                                            <div className="flex gap-2">
                                                <button onClick={() => setSelectedFoodInfo(food)} className="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-200 transition-colors shadow-sm">
                                                    Ver Info
                                                </button>
                                                
                                                {!isTCAView && (
                                                    <React.Fragment>
                                                        <button onClick={() => handleEditClick(food)} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-200 transition-colors shadow-sm" title="Editar">
                                                            <Edit2 />
                                                        </button>
                                                        <button onClick={() => confirmDelete(food.id, food.name)} className="bg-red-100 text-red-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-200 transition-colors shadow-sm" title="Eliminar">
                                                            <Trash2 />
                                                        </button>
                                                    </React.Fragment>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    ) : Object.keys(groupedFoods).length === 0 ? (
                        <div className="text-center py-10 text-gray-500">
                            <Utensils className="text-4xl mx-auto mb-3 text-gray-300" />
                            <p>No se encontraron alimentos en este historial.</p>
                        </div>
                    ) : (
                        <div className="flex flex-col gap-2">
                            {orderedGroups.map(groupName => (
                                <CollapsibleGroup key={groupName} title={groupName} count={groupedFoods[groupName].length} defaultOpen={false} headerClass="bg-gray-800 text-white">
                                    {groupedFoods[groupName].map(food => (
                                        <div key={food.id} className="p-4 flex justify-between items-center hover:bg-gray-50 transition-colors gap-2">
                                            <div className="flex-1 overflow-hidden pr-2">
                                                <div className="font-semibold text-gray-700 text-sm truncate">{food.name}</div>
                                                <div className="text-xs text-gray-400">{food.kcal} kcal</div>
                                            </div>
                                            
                                            <div className="flex gap-2">
                                                <button onClick={() => setSelectedFoodInfo(food)} className="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-200 transition-colors shadow-sm">
                                                    Ver Info
                                                </button>
                                                
                                                {!isTCAView && (
                                                    <React.Fragment>
                                                        <button onClick={() => handleEditClick(food)} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-200 transition-colors shadow-sm" title="Editar">
                                                            <Edit2 />
                                                        </button>
                                                        <button onClick={() => confirmDelete(food.id, food.name)} className="bg-red-100 text-red-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-200 transition-colors shadow-sm" title="Eliminar">
                                                            <Trash2 />
                                                        </button>
                                                    </React.Fragment>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </CollapsibleGroup>
                            ))}
                        </div>
                    )}

                    {/* Modal de Información Nutricional con Micronutrientes Completos */}
                    {selectedFoodInfo && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col max-h-[90vh] transform transition-all">
                                <div className="p-4 bg-indigo-600 text-white flex justify-between items-start gap-2">
                                    <div>
                                        <h3 className="font-bold text-lg leading-tight">{selectedFoodInfo.name}</h3>
                                        <p className="text-xs text-indigo-200 mt-1">{selectedFoodInfo.group}</p>
                                    </div>
                                    <button onClick={() => setSelectedFoodInfo(null)} className="text-white hover:text-gray-200 transition-colors p-1">
                                        <X className="text-xl" />
                                    </button>
                                </div>
                                
                                <div className="p-5 overflow-y-auto bg-gray-50">
                                    <div className="grid grid-cols-4 gap-2 mb-6">
                                        <div className="bg-white p-2 rounded-xl border border-gray-200 text-center shadow-sm flex flex-col justify-center">
                                            <div className="text-[10px] text-gray-500 uppercase font-bold mb-1">Kcal</div>
                                            <div className="font-black text-gray-800 text-sm">{selectedFoodInfo.kcal}</div>
                                        </div>
                                        <div className="bg-blue-50 p-2 rounded-xl border border-blue-200 text-center shadow-sm flex flex-col justify-center">
                                            <div className="text-[10px] text-blue-500 uppercase font-bold mb-1">Prot</div>
                                            <div className="font-black text-blue-700 text-sm">{selectedFoodInfo.protein}g</div>
                                        </div>
                                        <div className="bg-green-50 p-2 rounded-xl border border-green-200 text-center shadow-sm flex flex-col justify-center">
                                            <div className="text-[10px] text-green-500 uppercase font-bold mb-1">Carb</div>
                                            <div className="font-black text-green-700 text-sm">{selectedFoodInfo.carbs}g</div>
                                        </div>
                                        <div className="bg-yellow-50 p-2 rounded-xl border border-yellow-200 text-center shadow-sm flex flex-col justify-center">
                                            <div className="text-[10px] text-yellow-600 uppercase font-bold mb-1">Grasa</div>
                                            <div className="font-black text-yellow-700 text-sm">{selectedFoodInfo.fats}g</div>
                                        </div>
                                    </div>

                                    {selectedFoodInfo.micros && (
                                        <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                            <h4 className="font-bold text-gray-800 text-xs uppercase tracking-wider mb-3 border-b pb-2">Detalle de Micronutrientes</h4>
                                            <div className="space-y-2.5 text-sm">
                                                {MICRO_FIELDS.map(f => {
                                                    const val = selectedFoodInfo.micros[f.key];
                                                    if (val !== '' && val !== undefined && val !== null) {
                                                        return (
                                                            <div key={f.key} className="flex justify-between items-center border-b border-gray-50 pb-1">
                                                                <span className="text-gray-500 font-medium">{f.label}</span>
                                                                <span className="font-bold text-gray-700">{val} {f.unit}</span>
                                                            </div>
                                                        );
                                                    }
                                                    return null;
                                                })}
                                                
                                                {selectedFoodInfo.micros.other && (
                                                    <div className="flex flex-col mt-3">
                                                        <span className="text-gray-500 text-xs mb-1 font-medium">Otros / Notas:</span>
                                                        <span className="font-medium text-sm text-gray-800 bg-yellow-50 border border-yellow-200 p-2 rounded">{selectedFoodInfo.micros.other}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                    {selectedFoodInfo.sourceLink && (
                                        <div className="mt-4 text-center text-xs text-gray-400 font-medium">
                                            Fuente: {selectedFoodInfo.sourceLink}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        // --- Componente: Pestaña de Planificaciones Guardadas ---
        const SavedPlansView = ({ savedPlans, onLoad, onDelete }) => (
            <div className="pb-32 flex flex-col gap-4">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2 mb-2">
                        <Bookmark className="text-indigo-600" /> Planificaciones Guardadas
                    </h2>
                    <p className="text-sm text-gray-500 mb-4">Carga o elimina tus minutas guardadas previamente.</p>

                    {savedPlans.length === 0 ? (
                        <div className="text-center py-10 text-gray-400">
                            <Bookmark className="text-4xl mx-auto mb-3 opacity-30" />
                            <p>No tienes planificaciones guardadas.</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {savedPlans.map(plan => (
                                <div key={plan.id} className="p-4 rounded-xl border border-gray-100 hover:border-indigo-100 transition-colors flex flex-col gap-3 bg-gray-50">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h3 className="font-bold text-gray-800">{plan.name}</h3>
                                            <div className="text-xs text-gray-500 mt-1">
                                                {plan.targetKcal} kcal • {plan.mealTimes.length} comidas
                                            </div>
                                        </div>
                                        <span className="text-[10px] text-gray-400 bg-white px-2 py-1 rounded border shadow-sm">
                                            {new Date(plan.date).toLocaleDateString()}
                                        </span>
                                    </div>
                                    <div className="flex gap-2 w-full mt-1">
                                        <button 
                                            onClick={() => onLoad(plan)} 
                                            className="flex-1 bg-indigo-100 text-indigo-700 py-2 rounded-lg text-xs font-bold hover:bg-indigo-200 transition-colors"
                                        >
                                            Cargar Plan
                                        </button>
                                        <button 
                                            onClick={() => onDelete(plan.id, plan.name)} 
                                            className="bg-red-100 text-red-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-200 transition-colors"
                                            title="Eliminar"
                                        >
                                            <Trash2 />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );

        // --- Componente Principal ---
        function App() {
            const [view, setView] = useState('welcome');
            const [activeTab, setActiveTab] = useState('calculator'); // tabs: calculator, add, historyTca, historyPersonal, saved
            const [isSelectorOpen, setIsSelectorOpen] = useState(false);
            
            const [targetKcal, setTargetKcal] = useState(2000);
            const [macros, setMacros] = useState({ p: 25, c: 50, f: 25 });
            const [mealTimes, setMealTimes] = useState([
                { id: 1, time: '07:00', name: 'Desayuno', prepName: '', items: [] },
                { id: 2, time: '13:00', name: 'Almuerzo', prepName: '', items: [] },
                { id: 3, time: '20:00', name: 'Cena', prepName: '', items: [] }
            ]);
            
            const [foodList, setFoodList] = useState([]);
            const [currentFood, setCurrentFood] = useState(INITIAL_FOOD_STATE);
            
            // Estado de Planificaciones Guardadas
            const [savedPlans, setSavedPlans] = useState([]);
            
            // Estados para desplegables
            const [showMicros, setShowMicros] = useState(false);
            const [isMicrosExpanded, setIsMicrosExpanded] = useState(false);
            const [isSavePlanModalOpen, setIsSavePlanModalOpen] = useState(false);

            // Estado para el Modal Personalizado
            const [modalState, setModalState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'alert' });

            const showConfirm = (title, message, onConfirm) => {
                setModalState({ isOpen: true, title, message, onConfirm, type: 'confirm' });
            };

            const showAlert = (title, message) => {
                setModalState({ isOpen: true, title, message, onConfirm: null, type: 'alert' });
            };

            const closeModal = () => {
                setModalState(prev => ({ ...prev, isOpen: false }));
            };

            // CARGA INICIAL DE DATOS
            useEffect(() => {
                const savedFoods = localStorage.getItem('myNutriFoods');
                const savedKcal = localStorage.getItem('myTargetKcal');
                const savedMacros = localStorage.getItem('myMacros');
                const savedMeals = localStorage.getItem('myNutriMealTimes');
                const savedPlansData = localStorage.getItem('myNutriSavedPlans');

                let initialFoods = [];
                
                // Cargar datos de baseDeDatos.js y marcarlos como TCA oficial (isTCA: true)
                if (typeof window.ALIMENTOS_PRECARGADOS !== 'undefined') {
                    initialFoods = window.ALIMENTOS_PRECARGADOS.map(f => ({...f, isTCA: true}));
                }

                // Cargar datos personales del localStorage y marcarlos como Personal (isTCA: false)
                if (savedFoods) {
                    const localFoods = JSON.parse(savedFoods);
                    const newLocalFoods = localFoods.filter(lf => !initialFoods.some(pf => pf.id === lf.id));
                    initialFoods = [...initialFoods, ...newLocalFoods.map(f => ({...f, isTCA: false}))];
                }
                
                setFoodList(initialFoods);

                if (savedKcal) setTargetKcal(JSON.parse(savedKcal));
                if (savedMacros) setMacros(JSON.parse(savedMacros));
                if (savedMeals) setMealTimes(JSON.parse(savedMeals));
                if (savedPlansData) setSavedPlans(JSON.parse(savedPlansData));
            }, []);

            useEffect(() => { localStorage.setItem('myNutriFoods', JSON.stringify(foodList.filter(f => !f.isTCA))); }, [foodList]);
            useEffect(() => { 
                localStorage.setItem('myTargetKcal', JSON.stringify(targetKcal));
                localStorage.setItem('myMacros', JSON.stringify(macros));
            }, [targetKcal, macros]);
            useEffect(() => { localStorage.setItem('myNutriMealTimes', JSON.stringify(mealTimes)); }, [mealTimes]);
            useEffect(() => { localStorage.setItem('myNutriSavedPlans', JSON.stringify(savedPlans)); }, [savedPlans]);

            const handleMacroChange = (key, value) => {
                const newValue = value === '' ? '' : parseFloat(value);
                setMacros(prev => ({ ...prev, [key]: newValue }));
            };

            const calculateGrams = () => {
                const pGrams = (targetKcal * ((macros.p || 0) / 100)) / 4;
                const cGrams = (targetKcal * ((macros.c || 0) / 100)) / 4;
                const fGrams = (targetKcal * ((macros.f || 0) / 100)) / 9;
                return { p: Math.round(pGrams), c: Math.round(cGrams), f: Math.round(fGrams) };
            };

            const totalPercentage = (macros.p || 0) + (macros.c || 0) + (macros.f || 0);

            const handleImportCSV = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const lines = text.split('\n');
                    let headerFound = false;
                    let currentGroup = "Importado";
                    const newFoods = [];
                    
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.trim().replace(/^"|"$/g, ''));
                        
                        if (!headerFound) {
                            if (row.includes('Energía(kcal)') || row.includes('Proteínas (g)') || line.includes('Energía(kcal)')) {
                                headerFound = true;
                                if (row[0] && row[0].length > 3 && !row[0].includes('Energía')) {
                                    currentGroup = row[0];
                                }
                            }
                            continue;
                        }
                        
                        if (row.length < 10) continue; 
                        
                        const name = row[0];
                        if (!name || name.toUpperCase() === 'EN BLANCO' || name.toLowerCase().includes('fuentes/referencias')) continue;
                        
                        const kcalRaw = row[4];
                        if (!kcalRaw || isNaN(parseFloat(kcalRaw))) {
                            if (name.length > 3) currentGroup = name;
                            continue;
                        }
                        
                        const food = {
                            id: Date.now().toString() + '-' + i,
                            name: name,
                            group: currentGroup || "Otros",
                            kcal: parseFloat(row[4]) || 0,
                            protein: parseFloat(row[7]) || 0,
                            carbs: parseFloat(row[8]) || 0,
                            fats: parseFloat(row[11]) || 0,
                            sourceLink: row[2] || 'Base de Datos Importada',
                            isTCA: false, 
                            micros: {
                                ...Object.fromEntries(MICRO_FIELDS.map(f => [f.key, ''])),
                                vitC: parseFloat(row[18]) || '',
                                sodium: parseFloat(row[29]) || '',
                                calcium: parseFloat(row[31]) || '',
                                iron: parseFloat(row[34]) || '',
                                fiber: parseFloat(row[9]) || '',
                                sugars: parseFloat(row[10]) || '',
                            }
                        };
                        newFoods.push(food);
                    }
                    
                    if(newFoods.length > 0) {
                        setFoodList(prev => {
                            const newUniqueFoods = newFoods.filter(nf => !prev.some(pf => pf.name === nf.name));
                            return [...prev, ...newUniqueFoods];
                        });
                        showAlert("Importación Exitosa", `Se importaron ${newFoods.length} alimentos a tu Historial Personal.`);
                    } else {
                        showAlert("Error de Importación", "No se detectaron alimentos válidos. Asegúrate de guardar el archivo como 'CSV delimitado por comas'.");
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const handleSaveFood = async (e) => {
                e.preventDefault();
                if (!currentFood.name) { 
                    showAlert("Faltan datos", "Por favor, ponle un nombre al alimento."); 
                    return; 
                }

                const isEditing = !!currentFood.id;
                const foodToSave = isEditing ? currentFood : { ...currentFood, id: Date.now().toString(), isTCA: false };

                if (isEditing) setFoodList(prev => prev.map(item => item.id === foodToSave.id ? foodToSave : item));
                else setFoodList(prev => [...prev, foodToSave]);
                
                setCurrentFood(INITIAL_FOOD_STATE);
                setShowMicros(false);
                setActiveTab('historyPersonal');
            };

            const handleEditClick = (food) => { 
                setCurrentFood(food); 
                setActiveTab('add'); 
            };
            
            const handleDeleteClick = (id) => {
                setFoodList(prev => prev.filter(item => item.id !== id));
            };

            // --- Lógica para Guardar y Cargar Planificaciones ---
            const handleSaveCurrentPlan = (name) => {
                const newPlan = {
                    id: Date.now(),
                    name: name,
                    targetKcal,
                    macros,
                    mealTimes,
                    date: new Date().toISOString()
                };
                setSavedPlans([...savedPlans, newPlan]);
                showAlert("Planificación Guardada", `La minuta "${name}" ha sido guardada en la pestaña 'Guardados'.`);
            };

            const handleLoadPlan = (plan) => {
                showConfirm(
                    "Cargar Planificación", 
                    `¿Deseas reemplazar tu configuración y minuta actual con "${plan.name}"? Los datos no guardados de tu vista actual se perderán.`, 
                    () => {
                        setTargetKcal(plan.targetKcal);
                        setMacros(plan.macros);
                        setMealTimes(plan.mealTimes);
                        setActiveTab('calculator');
                        showAlert("Planificación Cargada", `Se ha cargado "${plan.name}" exitosamente.`);
                    }
                );
            };

            const handleDeleteSavedPlan = (id, name) => {
                showConfirm(
                    "Eliminar Planificación",
                    `¿Seguro que deseas eliminar permanentemente la planificación "${name}"?`,
                    () => {
                        setSavedPlans(prev => prev.filter(p => p.id !== id));
                    }
                );
            };

            if (view === 'welcome') return <WelcomeScreen onStart={() => setView('app')} />;

            return (
                <div className="min-h-screen font-sans text-gray-900 pb-24 bg-gray-50">
                    <CustomModalUI 
                        isOpen={modalState.isOpen}
                        title={modalState.title}
                        message={modalState.message}
                        onConfirm={modalState.onConfirm}
                        type={modalState.type}
                        onClose={closeModal}
                    />

                    <SavePlanModal 
                        isOpen={isSavePlanModalOpen}
                        onClose={() => setIsSavePlanModalOpen(false)}
                        onSave={handleSaveCurrentPlan}
                    />

                    <header className="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="bg-white/20 p-2 rounded-lg flex items-center justify-center">
                                <Apple className="text-green-300" />
                            </div>
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                PlannerN
                            </h1>
                        </div>
                        <button onClick={() => setView('welcome')} className="p-2 hover:bg-indigo-500 rounded-lg transition-colors"><Home/></button>
                    </header>

                    <main className="p-4 max-w-md mx-auto">
                        {activeTab === 'calculator' && <CalculatorView targetKcal={targetKcal} setTargetKcal={setTargetKcal} macros={macros} setMacros={setMacros} handleMacroChange={handleMacroChange} calculateGrams={calculateGrams} totalPercentage={totalPercentage} mealTimes={mealTimes} setMealTimes={setMealTimes} foodList={foodList} isSelectorOpen={isSelectorOpen} setIsSelectorOpen={setIsSelectorOpen} showConfirm={showConfirm} showAlert={showAlert} isMicrosExpanded={isMicrosExpanded} setIsMicrosExpanded={setIsMicrosExpanded} onSavePlanClick={() => setIsSavePlanModalOpen(true)} />}
                        {activeTab === 'add' && <AddFoodView currentFood={currentFood} setCurrentFood={setCurrentFood} handleSaveFood={handleSaveFood} showMicros={showMicros} setShowMicros={setShowMicros} activeTab={activeTab} setActiveTab={setActiveTab} />}
                        {activeTab === 'historyTca' && <FoodHistoryView foodList={foodList} isTCAView={true} handleEditClick={handleEditClick} handleDeleteClick={handleDeleteClick} handleImportCSV={handleImportCSV} showConfirm={showConfirm} showAlert={showAlert} />}
                        {activeTab === 'historyPersonal' && <FoodHistoryView foodList={foodList} isTCAView={false} handleEditClick={handleEditClick} handleDeleteClick={handleDeleteClick} handleImportCSV={handleImportCSV} showConfirm={showConfirm} showAlert={showAlert} />}
                        {activeTab === 'saved' && <SavedPlansView savedPlans={savedPlans} onLoad={handleLoadPlan} onDelete={handleDeleteSavedPlan} />}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 z-30 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                        <div className="flex justify-between items-center max-w-md mx-auto px-1 py-1">
                            <button onClick={() => { setActiveTab('calculator'); setCurrentFood(INITIAL_FOOD_STATE); }} className={`flex flex-col items-center py-2 px-1 flex-1 transition-colors ${activeTab === 'calculator' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <PieChart className="text-[20px] mb-1" /><span className="text-[10px] font-bold tracking-tight">Metas</span>
                            </button>
                            <button onClick={() => { setActiveTab('add'); setCurrentFood(INITIAL_FOOD_STATE); }} className={`flex flex-col items-center py-2 px-1 flex-1 transition-colors ${activeTab === 'add' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <PlusCircle className="text-[20px] mb-1" /><span className="text-[10px] font-bold tracking-tight">Agregar</span>
                            </button>
                            <button onClick={() => { setActiveTab('historyTca'); setCurrentFood(INITIAL_FOOD_STATE); }} className={`flex flex-col items-center py-2 px-1 flex-1 transition-colors ${activeTab === 'historyTca' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <BookOpen className="text-[20px] mb-1" /><span className="text-[10px] font-bold tracking-tight">TCA 2018</span>
                            </button>
                            <button onClick={() => { setActiveTab('historyPersonal'); setCurrentFood(INITIAL_FOOD_STATE); }} className={`flex flex-col items-center py-2 px-1 flex-1 transition-colors ${activeTab === 'historyPersonal' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <ClipboardList className="text-[20px] mb-1" /><span className="text-[10px] font-bold tracking-tight">Personal</span>
                            </button>
                            <button onClick={() => { setActiveTab('saved'); setCurrentFood(INITIAL_FOOD_STATE); }} className={`flex flex-col items-center py-2 px-1 flex-1 transition-colors ${activeTab === 'saved' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <Bookmark className="text-[20px] mb-1" /><span className="text-[10px] font-bold tracking-tight">Guardados</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
